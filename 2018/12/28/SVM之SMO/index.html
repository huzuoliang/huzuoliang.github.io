        <p>我们知道，软间隔<code>SVM</code>的优化目标为：</p>
<script type="math/tex; mode=display">
\begin{array} { c l } { \max \limits_ { \alpha } } & { \sum _ { i = 1 } ^ { n } \alpha _ { i } - \frac { 1 } { 2 } \sum _ { i , j = 1 } ^ { n } \alpha _ { i } \alpha _ { j } y _ { i } y _ { j } x _ { i } ^ { T } x _ { j } } \\ { \text {s.t.} } & { 0 \leq \alpha _ { i } \leq C , i = 1 , \ldots , n } \\ { } & { \sum _ { i = 1 } ^ { n } \alpha _ { i } y _ { i } = 0 } \end{array}</script><p>为了求解该问题，我们采用<code>SMO</code>算法，为了保证<script type="math/tex">\sum _ { i = 1 } ^ { n } y _ { i } \alpha _ { i } = 0</script>成立，我们每次选择两个<script type="math/tex">\alpha_i</script>进行优化，比如<script type="math/tex">\alpha_1,\alpha_2</script>，原始的<script type="math/tex">\alpha_1^{old},\alpha_2^{old},\alpha_3,\cdots,\alpha_n</script>当做常量处理，于是：</p>
<script type="math/tex; mode=display">
y_1\alpha_1+y_2\alpha_2=y_1\alpha_1^{old}+y_2\alpha_2^{old}=Const</script><a id="more"></a>
