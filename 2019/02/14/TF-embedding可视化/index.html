        <h3 id="可视化基本步骤"><a href="#可视化基本步骤" class="headerlink" title="可视化基本步骤"></a>可视化基本步骤</h3><ol>
<li><p>创建embedding变量，设置embedding变量名</p>
<figure class="highlight plain"><table><tr><td class="code"><pre><span class="line">embedding_var = tf.Variable(batch_xs, name=NAME_TO_VISUALISE_VARIABLE)</span><br><span class="line">summary_writer = tf.summary.FileWriter(LOG_DIR)</span><br></pre></td></tr></table></figure>
</li>
<li><p>配置embedding projector</p>
<a id="more"></a>
<figure class="highlight plain"><table><tr><td class="code"><pre><span class="line">config = projector.ProjectorConfig()</span><br><span class="line">embedding = config.embeddings.add()</span><br><span class="line">embedding.tensor_name = embedding_var.name</span><br><span class="line"></span><br><span class="line"># Specify where you find the metadata</span><br><span class="line">embedding.metadata_path = path_for_mnist_metadata #&apos;metadata.tsv&apos;</span><br><span class="line"></span><br><span class="line"># Specify where you find the sprite (we will create this later)</span><br><span class="line"># embedding.sprite.image_path = path_for_mnist_sprites #&apos;mnistdigits.png&apos;</span><br><span class="line"># embedding.sprite.single_image_dim.extend([28,28])</span><br><span class="line"></span><br><span class="line"># Say that you want to visualise the embeddings</span><br><span class="line">projector.visualize_embeddings(summary_writer, config)</span><br></pre></td></tr></table></figure>
</li>
<li><p>保存数据</p>
<figure class="highlight plain"><table><tr><td class="code"><pre><span class="line">saver = tf.train.Saver()</span><br><span class="line">saver.save(sess, os.path.join(LOG_DIR, &quot;model.ckpt&quot;), step)</span><br></pre></td></tr></table></figure>
</li>
</ol>
